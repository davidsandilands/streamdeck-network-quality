<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1920" height="960" viewBox="0 0 1920 960">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0E0E16"/>
    <stop offset="1" stop-color="#1B1B2A"/>
  </linearGradient>
  <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
    <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000000" flood-opacity="0.55"/>
  </filter>
</defs>
<rect width="1920" height="960" fill="url(#bg)"/>
<text x="150" y="330" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#ECECF1" text-anchor="start">Tune it to</text><text x="150" y="415" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#ECECF1" text-anchor="start">your setup</text><text x="152" y="500" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#9A9AAD" text-anchor="start">Units, parallel or sequential,</text><text x="152" y="542" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#9A9AAD" text-anchor="start">a specific interface, Private Relay,</text><text x="152" y="584" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#9A9AAD" text-anchor="start">and optional auto-refresh.</text><rect x="1060" y="150" width="720" height="660" rx="22" fill="#1E1E28" stroke="#2F2F3D" stroke-width="2" filter="url(#shadow)"/><text x="1100" y="220" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ECECF1" text-anchor="start">Network Quality Test</text><line x1="1100" y1="246" x2="1740" y2="246" stroke="#33333f" stroke-width="2"/><text x="1100" y="330" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#9A9AAD" text-anchor="start">Units</text><rect x="1380" y="300" width="360" height="48" rx="10" fill="#2A2A36" stroke="#3a3a48" stroke-width="2"/><text x="1398" y="332" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#ECECF1" text-anchor="start">Auto (Mbps / Gbps)</text><path d="M1704,320 l8,9 l8,-9" stroke="#9A9AAD" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="1100" y="422" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#9A9AAD" text-anchor="start">Mode</text><rect x="1380" y="392" width="360" height="48" rx="10" fill="#2A2A36" stroke="#3a3a48" stroke-width="2"/><text x="1398" y="424" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#ECECF1" text-anchor="start">Parallel</text><path d="M1704,412 l8,9 l8,-9" stroke="#9A9AAD" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="1100" y="514" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#9A9AAD" text-anchor="start">Interface</text><rect x="1380" y="484" width="360" height="48" rx="10" fill="#2A2A36" stroke="#3a3a48" stroke-width="2"/><text x="1398" y="516" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#9A9AAD" text-anchor="start">auto (e.g. en0)</text><text x="1100" y="606" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#9A9AAD" text-anchor="start">Private Relay</text><rect x="1380" y="580" width="40" height="40" rx="8" fill="#2A2A36" stroke="#3a3a48" stroke-width="2"/><text x="1100" y="698" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#9A9AAD" text-anchor="start">Auto-refresh (min)</text><rect x="1380" y="668" width="360" height="48" rx="10" fill="#2A2A36" stroke="#3a3a48" stroke-width="2"/><text x="1398" y="700" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#ECECF1" text-anchor="start">5</text>
</svg>